#############################################################################################
# pre-commit — language-agnostic hooks for this NON-python API repo.                         #
# Language-specific linting/formatting stays with the repo's own toolchain (prettier, buf).  #
# Ruff/mypy/uv are python-only and NOT included here.                                        #
#                                                                                            #
# - pre-commit hooks are run on staged files just before a commit or a push                 #
# - to run a given hook on any file at any time, run the following on the command line:     #
#    pre-commit run <HOOK_ID> --files <FILE1> <FILE2> ...                                    #
#############################################################################################

# Never touch generated / vendored code: docs/ is regenerated + deployed by the
# "Generate Documentation" CI (ondewo-protoc-gen-doc-action), node_modules/ is vendored,
# and *.pb.* are generated proto stubs. The .proto SOURCE under ondewo/ stays lintable.
exclude: '(^|/)node_modules/|^docs/|(_pb\.(js|d\.ts)$|_pb2\.pyi?$|_pb2_grpc\.py$|_grpc_pb\.(js|d\.ts)$)|\.pb\.'

fail_fast: false
# "fail_fast: false" means pre-commit continues to run hooks after the first failure

repos:

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.0
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [ maxkb=1024 ]
      - id: check-json          # validate (does NOT reformat) json/package.json
      - id: check-yaml
      - id: check-xml
      - id: check-merge-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/milin/giticket
    rev: '1.92'
    hooks:
      - id: giticket
        args: [ '--regex=(?:(?:feature|bugfix|support|hotfix)/)?(OND[0-9]{3}-[0-9]{1,5})[_-][\w-]+',
                '--format=[{ticket}] {commit_msg}',
                '--mode=regex_match' ]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [ commit-msg ]
